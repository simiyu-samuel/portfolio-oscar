<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .favicon-bg { fill: #1a1a2e; }
        .favicon-dot { fill: #00d4ff; }
      }
      @media (prefers-color-scheme: light) {
        .favicon-bg { fill: #ffffff; }
        .favicon-dot { fill: #0096d6; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="favicon-bg" width="100" height="100" rx="20"/>
  
  <!-- Brackets (code theme) -->
  <g class="favicon-dot" opacity="0.7">
    <text x="20" y="45" font-family="monospace" font-size="24" font-weight="bold">&lt;</text>
    <text x="60" y="45" font-family="monospace" font-size="24" font-weight="bold">/&gt;</text>
  </g>
  
  <!-- Central dot (Oscar.) -->
  <circle class="favicon-dot" cx="50" cy="65" r="6"/>
</svg>